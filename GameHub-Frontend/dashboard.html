<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game-Hub | Dashboard</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body onload="boot('dashboard.html')">
  <div class="site-shell">
    <header class="site-header" data-site-header></header>
    <section class="page-hero">
      <h1>Dashboard de usuario</h1>
      <p class="dashboard-copy"></p>
    </section>
    <section class="section-block">
      <div class="dashboard-stats"></div>
    </section>
    <section class="section-block grid-2">
      <article class="card">
        <span class="eyebrow">Perfil</span>
        <h2>Gestion de cuenta</h2>
        <p>Zona prevista para editar nombre, avatar, idioma, contrasena y preferencias del usuario autenticado.</p>
      </article>
      <article class="card">
        <span class="eyebrow">Actividad</span>
        <h2>Interacciones recientes</h2>
        <p>Zona prevista para comentarios, contenido guardado, valoraciones y seguimiento editorial segun el rol.</p>
      </article>
    </section>
    <footer class="site-footer" data-site-footer></footer>
  </div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
