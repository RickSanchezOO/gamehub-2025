{% extends 'base.html' %}
{% block content %}
<h1>Usuarios</h1>
{% for u in usuarios.items %}
    <p><strong>{{ u.nombre }}</strong> — {{ u.email }} — {{ u.rol }} — {{ 'Activo' if u.activo else 'Suspendido' }}</p>
    <form method="POST" action="/admin/usuarios/{{ u.id }}/rol" style="display:inline">
        <select name="rol">
            {% for r in ['Administrador','Redactor','Colaborador','Suscriptor'] %}
                <option value="{{ r }}" {{ 'selected' if u.rol == r }}>{{ r }}</option>
            {% endfor %}
        </select>
        <button type="submit">Cambiar rol</button>
    </form>
    <form method="POST" action="/admin/usuarios/{{ u.id }}/suspender" style="display:inline">
        <button type="submit">{{ 'Activar' if not u.activo else 'Suspender' }}</button>
    </form>
    <hr>
{% endfor %}
{% endblock %}
