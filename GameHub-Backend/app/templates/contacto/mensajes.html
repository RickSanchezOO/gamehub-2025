{% extends 'base.html' %}
{% block content %}
<h1>Mensajes de contacto</h1>
{% for m in mensajes.items %}
    <p><strong>{{ m.nombre }}</strong> ({{ m.email }}) — {{ m.fecha_envio.strftime('%d/%m/%Y') }}
    {% if not m.leido %}<span>[NO LEÍDO]</span>{% endif %}</p>
    <p>{{ m.mensaje }}</p>
    <form method="POST" action="/contacto/mensajes/{{ m.id }}/leido" style="display:inline">
        <button type="submit">Marcar leído</button>
    </form>
    <form method="POST" action="/contacto/mensajes/eliminar/{{ m.id }}" style="display:inline">
        <button type="submit">Eliminar</button>
    </form>
    <hr>
{% endfor %}
{% endblock %}
