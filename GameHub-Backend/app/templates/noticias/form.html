{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Editar' if noticia else 'Nueva' }} noticia</h1>
<form method="POST">
    <input type="text" name="titulo" placeholder="Título" value="{{ noticia.titulo if noticia else '' }}" required><br>
    <textarea name="cuerpo" required>{{ noticia.cuerpo if noticia else '' }}</textarea><br>
    <input type="text" name="imagen" placeholder="URL imagen" value="{{ noticia.imagen if noticia else '' }}"><br>
    <input type="text" name="etiquetas" placeholder="Etiquetas" value="{{ noticia.etiquetas if noticia else '' }}"><br>
    <select name="estado">
        <option value="borrador">Borrador</option>
        <option value="publicada">Publicada</option>
    </select><br>
    <button type="submit">Guardar</button>
</form>
{% endblock %}
